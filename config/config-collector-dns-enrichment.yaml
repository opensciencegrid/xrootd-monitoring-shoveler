# Sample configuration for XRootD Monitoring Collector with DNS Enrichment
# This configuration shows how to enable DNS enrichment for IP addresses

# State configuration
state:
  # TTL for state entries in seconds (default: 300 = 5 minutes)
  entry_ttl: 600
  
  # Maximum entries in state map (0 = unlimited)
  max_entries: 100000
  
  # Legacy option (deprecated): Disable synchronous reverse DNS lookups
  # When dns enrichment is enabled, this should be true to avoid blocking
  disable_reverse_dns: true
  
  # ---- DNS Enrichment Configuration (NEW) ----
  
  # Enable DNS enrichment with caching and worker pool
  # When enabled:
  # - IP addresses are resolved to hostnames via reverse DNS
  # - Results are cached with TTL to reduce DNS load
  # - Lookups happen concurrently in worker pool (non-blocking)
  # - Records wait for DNS lookup (or timeout) before publishing
  enable_dns_enrichment: true
  
  # DNS cache TTL in seconds (default: 3600 = 1 hour)
  # Cached hostnames are reused for this duration
  # Longer TTL = fewer DNS queries but less fresh data
  # Shorter TTL = more DNS queries but fresher data
  dns_cache_ttl: 1800  # 30 minutes
  
  # Number of concurrent DNS worker goroutines (default: 5)
  # More workers = higher concurrency for DNS lookups
  # Tune based on your traffic volume:
  # - Low traffic (<100 records/sec): 3-5 workers
  # - Medium traffic (100-1000/sec): 5-10 workers
  # - High traffic (>1000/sec): 10-20 workers
  dns_workers: 10
  
  # DNS lookup timeout in seconds (default: 2)
  # If DNS server doesn't respond within this time, record publishes without hostname
  # Lower = faster failover but may miss slow DNS servers
  # Higher = wait longer but may delay record processing
  dns_timeout: 2

# Input configuration
input:
  type: udp  # udp, file, or rabbitmq
  address: 0.0.0.0:9930
  
# Output configuration
output:
  type: mq  # mq, file, or both
  
# Message queue configuration (when output.type = mq or both)
mq: amqp  # amqp or stomp
amqp:
  url: amqp://guest:guest@localhost:5672/
  exchange: xrd.detailed
  exchange_wlcg: xrd.wlcg
  exchange_cache: xrd.cache
  exchange_tcp: xrd.tcp
  exchange_tpc: xrd.tpc
  
# Publishing worker pool (for AMQP)
amqp_publish_workers: 10  # Number of concurrent AMQP publishers

# Metrics
metrics: true
metrics_port: 8000

# Debug logging
debug: false
